name = "simple-typing-online"
main = "worker.js"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

[[durable_objects.bindings]]
name = "MATCH"
class_name = "Match"

[[durable_objects.bindings]]
name = "RANKING"
class_name = "Ranking"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Lobby", "Match"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Ranking"]
